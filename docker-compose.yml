services:

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/tcp/127.0.0.1/6333 >/dev/null 2>&1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build: .
    container_name: fastapi
    network_mode: host
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
